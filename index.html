<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCTA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/blanka" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/league-spartan" rel="stylesheet">
    <script src="pcta.js"></script>
</head>
<body>
    <div class="parent">
        <div class="div1">
            <nav>
                <div class="logo">
                    <img src="Icons/Logo.png" alt="Logo" class="logo-img" height="140px" width="140px">
                    Personal Computer 
                    <br>
                    Technical Assistance
                </div>
                <div class="navlinks">
                    <a href="home.html" class="active">Home</a>
                    <a href="about.html">About</a>
                </div>
            </nav>
        </div>
        <div class="div2">
            <div class="parag">
                <p>You may visit these links to learn more:</p>
            </div>
  
     <a href="https://easypc.com.ph">
    <div class="links-container">
    <div class="links-inner-box">
      <img src="Icons/easypc.jpg" alt="EASY PC Logo">
    </div>
        <div class="links-main">EASY PC</div>
    </div>
        </a>

<a href="https://pcx.com.ph">
    <div class="links-container">
        <div class="links-inner-box">
            <img src="Icons/pcexpress.png" alt="Pc Express Logo">
        </div>
        <div class="links-main">PC Express</div>
    </div>
        </a>

        <a href="https://www.pcworth.com">
    <div class="links-container">
    <div class="links-inner-box">
      <img src="Icons/pcworth.png" alt="PC Worth"> <!--Lagay n lg kyo isa pang link-->
    </div>
        <div class="links-main">PC WORTH</div>
    </div>
        </a>

        <a href="https://dynaquestpc.com">
    <div class="links-container">
    <div class="links-inner-box">
      <img src="Icons/dynaquest.jpg" alt="Dyna Quest"> <!--Lagay n lg kyo isa pang link-->
    </div>
        <div class="links-main">Dynaquest PC</div>
    </div>
        </a>


        </div>

        
        <div class="div3">
            <div class="selection-counter">
                <h2>
                    Select your Components
                </h2>
                <h5>
                    0/7 Components Selected
                </h5>
            </div>
            <div class="components">
                <button class="component-list" onclick="cpuclick()" data-category="Processor">
                    <div class="component-button-content">
                        <img src="Icons/PC Parts/cpu.png " alt="CPU Icon" width="30" height="30">
                        <span>Processor</span>
                    </div>
                    <div class="selected-display" id="selected-Processor"></div>
                </button>
                <button class="component-list" onclick="motherboard()" data-category="Motherboard">
                    <div class="component-button-content">
                        <img src="Icons/PC Parts/motherboard.png" alt="Motherboard Icon" width="30" height="30">
                        <span>Motherboard</span>
                    </div>
                    <div class="selected-display" id="selected-Motherboard"></div>
                </button>
                <button class="component-list" onclick="Storage()" data-category="Storage">
                    <div class="component-button-content">
                        <img src="Icons/PC Parts/ssd.png" alt="Storage Icon" width="30" height="30">
                        <span>Storage</span>
                    </div>
        
                    <div class="selected-display" id="selected-Storage"></div>
                </button>
                <button class="component-list" onclick="gpu()" data-category="Graphics Card">
                    <div class="component-button-content">
                        <img src="Icons/PC Parts/gpu.png" alt="GPU Icon" width="30" height="30">
                        <span>Graphics Card</span>
                    </div>
                    <div class="selected-display" id="selected-Graphics Card"></div>
                </button>
                <button class="component-list" onclick="ram()" data-category="Memory">
                    <div class="component-button-content">
                        <img src="Icons/PC Parts/ram.png" alt="RAM Icon" width="30" height="30">
                        <span>Random Access Memory</span>
                    </div>
                    <div class="selected-display" id="selected-Memory"></div>
                </button>
                <button class="component-list" onclick="psu()" data-category="Power Supply">
                    <div class="component-button-content">
                        <img src="Icons/PC Parts/psu.png" alt="PSU Icon" width="30" height="30">
                        <span>Power Supply</span>
                    </div>
                    <div class="selected-display" id="selected-Power Supply"></div>
                </button>
            </div>
        </div>
        <div class="div4">
            <div class="search-container">
                <input id="component-search" type="text" placeholder="Search components (name, category, specs, price)..." class="search-icon">
            </div>
            
    
    <div id="component-grid" class="components-grid">
            <!-- component here will be added or appear when 
             click in the button, the contents here are now on the 
             javascript file  -->
</div>
<div class="div5">
    <div class="total-label">Total Build Cost:</div>
    <div class="total-amount">₱0.00</div>
</div>
</body>
</html>
